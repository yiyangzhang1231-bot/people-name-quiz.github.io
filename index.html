<!DOCTYPE html>
<html lang="zh-CN">
<head>

            --text-light: #eee;
            --text-muted: #a0a0a0;

        body {

        .info-icon { font-size: 2rem; }

        .btn-secondary:hover { background: var(--secondary); color: white; }

        .question-number { color: var(--accent); font-size: 14px; margin-bottom: 15px; }
        .question-text { font-size: 1.3rem; line-height: 1.6; margin-bottom: 25px; }

        .dim-label { width: 70px; text-align: right; font-size: 13px; color: var(--text-muted); }
        .dim-bar-wrapper { flex: 1; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .dim-bar { height: 100%; border-radius: 10px; transition: width 1s ease; }
        .dim-bar.user-bar { background: #FF69B4; position: absolute; bottom: 0; left: 0; opacity: 0.8; }

        .match-score { margin: 30px 0; }

        .match-score p { color: var(--text-muted); }
        .result-footer { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .easter-egg-container { max-width: 500px; width: 100%; text-align: center; animation: fadeInUp 0.8s ease; }
        .egg-badge { display: inline-block; background: var(--accent); color: #000; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 20px; animation: bounce 0.5s ease infinite; }

        .egg-avatar { font-size: 8rem; margin-bottom: 20px; animation: wiggle 0.5s ease infinite; }

        .egg-subtitle { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 20px; }

        @keyframes scaleIn { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
        @keyframes wiggle { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }

            .question-text { font-size: 1.1rem; }

    </style>
</head>

// ===== 引擎 =====
const QuizEngine = {
    userAnswers: {},
    // 计算每个维度在前19题中是否有区分度（不同选项分数不同）
    getTestedDimensions() {
        const tested = {};
        dimensions.forEach(d => tested[d.key] = false);
        questions.slice(0, 19).forEach(q => {
            const dimValues = {};
            q.options.forEach(opt => {
                if (opt.scores) {
                    Object.keys(opt.scores).forEach(dim => {
                        if (!dimValues[dim]) dimValues[dim] = new Set();
                        dimValues[dim].add(opt.scores[dim]);
                    });
                }
            });
            // 只有当某维度有不同分数值时才标记为已测试
            Object.keys(dimValues).forEach(dim => {
                if (dimValues[dim].size > 1 && tested.hasOwnProperty(dim)) {
                    tested[dim] = true;
                }
            });
        });
        return tested;
    },
    // 计算用户各维度得分（累加19道题的分值）
    calculateUserScores() {
        const userScores = { justice: 0, principle: 0, slickness: 0, ambition: 0, boldness: 0, empathy: 0, risk: 0, foreign: 0 };
        const testedDims = this.getTestedDimensions();
        // 只计算前19题（第20题是彩蛋题，不计入正常分数）
        questions.slice(0, 19).forEach(q => {
            const ans = this.userAnswers[q.id];
            if (ans && ans.scores) {
                Object.keys(ans.scores).forEach(dim => {
                    if (userScores.hasOwnProperty(dim)) {
                        userScores[dim] += ans.scores[dim];
                    }
                });
            }
        });
        // 分数范围归一化到0-100
        Object.keys(userScores).forEach(dim => {
            if (testedDims[dim]) {
                // 该维度被测试过，正常归一化
                userScores[dim] = Math.max(0, Math.min(100, Math.round((userScores[dim] + 100) * 0.5)));
            } else {
                // 该维度没有被任何题目有效测试，强制为0
                userScores[dim] = 0;
            }
        });
        return userScores;
    },
    euclideanDistance(userScores, charScores) {
        let dist = 0;
        dimensions.forEach(d => {
            const diff = (userScores[d.key] || 0) - (charScores[d.key] || 0);
            dist += diff * diff;
        });
        return Math.sqrt(dist);
    },
    calculateSimilarity(distance) {
        // 最大距离约为 sqrt(8 * 100^2) ≈ 283
        const maxDistance = 283;
        return Math.max(0, Math.round((1 - distance / maxDistance) * 100));
    },
    checkEasterEgg() {
        const ans20 = this.userAnswers[20];
        return ans20 && ans20.scores && ans20.scores.foreign >= 50; // 选"是"
    },
    findBestMatch() {
        if (this.checkEasterEgg()) {
            return { isEasterEgg: true, character: characterProfiles.chenQingquan };
        }
        const userScores = this.calculateUserScores();
        const candidates = Object.entries(characterProfiles).filter(([k]) => k !== 'chenQingquan');
        let best = null, minDist = Infinity, dimComp = {};
        candidates.forEach(([key, profile]) => {
            const dist = this.euclideanDistance(userScores, profile.standardScores);
            dimComp[key] = { user: userScores, character: profile.standardScores, distance: dist };
            if (dist < minDist) { minDist = dist; best = { key, character: profile, distance: dist }; }
        });
        return { isEasterEgg: false, character: best.character, similarity: this.calculateSimilarity(minDist), dimensionComparison: dimComp[best.key] };
    },
    getDimensionComparison(result) {
        if (result.isEasterEgg) return null;
        const comp = result.dimensionComparison;
        return dimensions.map(d => ({ name: d.name, color: d.color, userScore: comp.user[d.key] || 0, charScore: comp.character[d.key] || 0 }));
    },
    reset() { this.userAnswers = {}; }
};

// ===== 图表 =====
function renderAnalysisChart(containerId, userScores) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    dimensions.forEach(d => {
        container.innerHTML += `<div class="dim-bar-container"><span class="dim-label">${d.name}</span><div class="dim-bar-wrapper"><div class="dim-bar" style="width:${userScores[d.key] || 0}%;background:${d.color};"></div></div><span class="dim-value" style="color:${d.color};">${userScores[d.key] || 0}</span></div>`;
    });
}

function renderComparisonChart(containerId, data) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    if (!data) { container.innerHTML = '<p style="color:var(--text-muted);">彩蛋角色无需对比~</p>'; return; }
    data.forEach(d => {
        container.innerHTML += `<div class="dim-bar-container"><span class="dim-label">${d.name}</span><div class="dim-bar-wrapper"><div class="dim-bar user-bar" style="width:${d.userScore}%;"></div><div class="dim-bar char-bar" style="width:${d.charScore}%;"></div></div><span class="dim-value">${d.userScore}/${d.charScore}</span></div>`;
    });
}

function animateNumber(el, target, duration = 1000) {
    const start = performance.now();
    const animate = (time) => {
        const progress = Math.min((time - start) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 2);
        el.textContent = Math.round(start + (target - start) * ease);
        if (progress < 1) requestAnimationFrame(animate);
    };
    requestAnimationFrame(animate);
}

const QuizApp = {
    currentQuestion: 0,
    init() {
        document.getElementById('start-btn').onclick = () => this.startQuiz();
        document.getElementById('prev-btn').onclick = () => this.prevQuestion();
        document.getElementById('next-btn').onclick = () => this.nextQuestion();
        document.getElementById('submit-btn').onclick = () => this.submitQuiz();
        document.getElementById('share-btn').onclick = () => this.shareResult();
        document.getElementById('restart-btn').onclick = () => this.restart();
        document.getElementById('egg-share-btn').onclick = () => this.shareEasterEgg();
        document.getElementById('egg-restart-btn').onclick = () => this.restart();
        document.getElementById('total-questions').textContent = questions.length;
    },
    switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },
    startQuiz() {
        QuizEngine.reset();
        this.currentQuestion = 0;
        this.renderQuestion();
        this.switchScreen('quiz-screen');
    },
    renderQuestion() {
        const q = questions[this.currentQuestion];
        document.getElementById('current-question').textContent = this.currentQuestion + 1;
        document.getElementById('q-num').textContent = this.currentQuestion + 1;
        document.getElementById('progress-fill').style.width = (this.currentQuestion / questions.length * 100) + '%';
        document.getElementById('question-text').textContent = q.text;
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option-item' + (QuizEngine.userAnswers[q.id] && QuizEngine.userAnswers[q.id].text === opt.text ? ' selected' : '');
            div.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${opt.text}</span>`;
            div.onclick = () => this.selectOption(q.id, opt, div);
            optsContainer.appendChild(div);
        });
        document.getElementById('prev-btn').disabled = this.currentQuestion === 0;
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        if (this.currentQuestion === questions.length - 1) {
            nextBtn.style.display = 'none';
            submitBtn.style.display = 'inline-block';
        } else {
            nextBtn.style.display = 'inline-block';
            submitBtn.style.display = 'none';
        }
        nextBtn.disabled = !QuizEngine.userAnswers[q.id];
        submitBtn.disabled = !QuizEngine.userAnswers[q.id];
    },
    selectOption(qId, opt, el) {
        QuizEngine.userAnswers[qId] = opt;
        document.querySelectorAll('.option-item').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        if (this.currentQuestion === questions.length - 1) {
            document.getElementById('submit-btn').disabled = false;
        } else {
            document.getElementById('next-btn').disabled = false;
        }
    },
    prevQuestion() { if (this.currentQuestion > 0) { this.currentQuestion--; this.renderQuestion(); } },
    nextQuestion() { if (this.currentQuestion < questions.length - 1) { this.currentQuestion++; this.renderQuestion(); } },
    submitQuiz() {
        const result = QuizEngine.findBestMatch();
        if (result.isEasterEgg) this.showEasterEgg();
        else this.showResult(result);
    },
    showEasterEgg() { this.switchScreen('easter-egg-screen'); },
    showResult(result) {
        const { character, similarity } = result;
        document.getElementById('character-avatar').textContent = character.avatar;
        document.getElementById('character-name').textContent = character.name;
        document.getElementById('character-title').textContent = character.title;
        document.getElementById('character-quote').textContent = `"${character.quote}"`;
        document.getElementById('legend-char-name').textContent = character.name;
        const traitsContainer = document.getElementById('character-traits');
        traitsContainer.innerHTML = '';
        character.traits.forEach(t => { const span = document.createElement('span'); span.className = 'trait-tag'; span.textContent = t; traitsContainer.appendChild(span); });
        renderAnalysisChart('dimension-chart', QuizEngine.calculateUserScores());
        renderComparisonChart('comparison-chart', QuizEngine.getDimensionComparison(result));
        this.switchScreen('result-screen');
        setTimeout(() => animateNumber(document.getElementById('match-percent'), similarity, 1500), 100);
    },
    shareResult() {
        const char = QuizEngine.findBestMatch().character;
        const text = `我在"人民的名义性格测试"中，最像 ${char.name}！\n${char.title} - "${char.quote}"\n\n#人民的名义 #性格测试`;
        if (navigator.share) navigator.share({ title: '人民的名义性格测试', text }).catch(() => this.copy(text));
        else this.copy(text);
    },
    shareEasterEgg() {
        const text = `我在"人民的名义性格测试"中解锁了隐藏彩蛋——陈清泉！\n"学外语是提高自身素质的重要途径..."\n\n#人民的名义 #隐藏角色 #陈清泉`;
        if (navigator.share) navigator.share({ title: '彩蛋', text }).catch(() => this.copy(text));
        else this.copy(text);
    },
    copy(text) { navigator.clipboard.writeText(text).then(() => alert('结果已复制！快去分享吧~')).catch(() => alert('复制失败，请手动复制~')); },
    restart() { QuizEngine.reset(); this.currentQuestion = 0; this.switchScreen('welcome-screen'); }
};

document.addEventListener('DOMContentLoaded', () => QuizApp.init());
</script>
